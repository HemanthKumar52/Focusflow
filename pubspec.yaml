name: focusflow
description: "FocusFlow — Cross-platform productivity app with neumorphic UI"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Local Database
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.5

  # Navigation
  go_router: ^14.8.1

  # UI & Animations
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  flutter_staggered_grid_view: ^0.7.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0

  # Charts & Visualizations
  fl_chart: ^0.70.2

  # Calendar
  table_calendar: ^3.1.3

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.19.1
  shared_preferences: ^2.3.4

  # Audio Playback (Voice Notes)
  audioplayers: ^6.1.0

  # Permissions
  permission_handler: ^11.3.1

  # Search
  fuzzy: ^0.5.1

  # Bluetooth
  flutter_blue_plus: ^1.35.2

  # QR Code
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

  # WiFi / Network Discovery
  network_info_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icons/
